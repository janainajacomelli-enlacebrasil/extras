<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisão de Português – Enlace Brasil</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f6fa; color: #1a1a2e; min-height: 100vh; padding: 1.5rem; }
.logo-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1rem; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot.navy { background: #0d3b6e; } .dot.teal { background: #1a9a8a; } .dot.gold { background: #f5c842; }
.logo-bar span { font-size: 12px; font-weight: 700; color: #0d3b6e; letter-spacing: 1.5px; text-transform: uppercase; }
.header { text-align: center; margin-bottom: 1.5rem; }
.header h1 { font-size: 22px; font-weight: 700; color: #0d3b6e; }
.header p { font-size: 13px; color: #5a6478; margin-top: 4px; }

/* Category tabs */
.cat-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.2rem; }
.cat-tab { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; color: #5a6478; cursor: pointer; transition: all 0.15s; }
.cat-tab:hover { border-color: #1a9a8a; color: #1a9a8a; }
.cat-tab.active { background: #0d3b6e; border-color: #0d3b6e; color: #fff; }

/* Card grid */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); gap: 9px; margin-bottom: 1.5rem; }
.card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px 11px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 4px; }
.card:hover { border-color: #1a9a8a; background: #f0faf8; }
.card.active { border: 2px solid #0d3b6e; background: #eaf0fa; }
.card .ico { font-size: 20px; }
.card .label { font-size: 12.5px; font-weight: 700; color: #0d3b6e; line-height: 1.3; }
.card .sub { font-size: 11px; color: #718096; }

/* Panel */
.panel { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 14px; padding: 1.5rem; min-height: 220px; }
.panel h3 { font-size: 17px; font-weight: 700; color: #0d3b6e; margin-bottom: 14px; }
.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
.cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 8px; }
.mini-card { background: #f5f6fa; border-radius: 8px; padding: 9px 11px; font-size: 12.5px; line-height: 1.6; }
.mini-card strong { font-size: 13px; color: #0d3b6e; display: block; margin-bottom: 3px; }
.example { background: #f0faf8; border-radius: 8px; padding: 10px 14px; margin: 8px 0; font-size: 13px; border-left: 4px solid #1a9a8a; line-height: 1.6; }
.example b { color: #0d3b6e; }
.example.gold { background: #faeeda; border-left-color: #f5c842; }
.example.red { background: #fcebeb; border-left-color: #e24b4a; }
.example.navy { background: #eaf0fa; border-left-color: #0d3b6e; }
.tag { display: inline-block; background: #eaf0fa; color: #0d3b6e; border-radius: 20px; padding: 3px 10px; font-size: 11.5px; font-weight: 700; margin: 3px; }
.tag.teal { background: #e1f5ee; color: #0f6e56; }
.tag.gold { background: #faeeda; color: #854f0b; }
.tag.red { background: #fcebeb; color: #a32d2d; }
.divider { border: none; border-top: 1px solid #e2e8f0; margin: 12px 0; }
.placeholder { color: #a0aec0; font-size: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 180px; gap: 10px; }
.placeholder .big { font-size: 40px; }

/* Ditado */
.ditado-text { font-size: 14px; line-height: 2; color: #1a1a2e; background: #f5f6fa; border-radius: 10px; padding: 1rem 1.2rem; border-left: 4px solid #0d3b6e; }
.ditado-text .hl-s { color: #0f6e56; font-weight: 700; }
.ditado-text .hl-ss { color: #0d3b6e; font-weight: 700; }
.ditado-text .hl-c { color: #854f0b; font-weight: 700; }
.reveal-btn { margin-top: 10px; background: #0d3b6e; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
.reveal-btn:hover { background: #1a9a8a; }
.hidden { display: none; }

@media (max-width: 600px) {
  .cols, .cols-3 { grid-template-columns: 1fr 1fr; }
  body { padding: 0.8rem; }
}
</style>
</head>

const grid = document.getElementById('grid');
const panel = document.getElementById('panel');
const catTabsEl = document.getElementById('catTabs');
let activeCat = 'sons';

function renderGrid(cat) {
  grid.innerHTML = '';
  temas.filter(t => t.cat === cat).forEach(t => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="ico">${t.ico}</div><div class="label">${t.label}</div><div class="sub">${t.sub}</div>`;
    card.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      panel.innerHTML = conteudo[t.id] || '<p style="color:#a0aec0;padding:1rem">Em breve.</p>';
    });
    grid.appendChild(card);
  });
  panel.innerHTML = '<div class="placeholder"><div class="big">📖</div><span>Selecione um tema acima</span></div>';
}

catTabsEl.querySelectorAll('.cat-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    catTabsEl.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    renderGrid(activeCat);
  });
});

renderGrid('sons');
</script>
